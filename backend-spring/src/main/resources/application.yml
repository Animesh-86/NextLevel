server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nextlevel}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
      chat:
        options:
          model: gemini-2.0-flash
      embedding:
        options:
          model: text-embedding-004
  jackson:
    default-property-inclusion: non_null

resilience4j.circuitbreaker:
  instances:
    geminiApi:
      slidingWindowSize: 5
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 3
resilience4j.retry:
  instances:
    geminiApi:
      maxAttempts: 3
      waitDuration: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:2592000000}
