server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nextlevel}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: "https://api.groq.com/openai"
      chat:
        options:
          model: llama-3.3-70b-versatile
  jackson:
    default-property-inclusion: non_null

resilience4j.circuitbreaker:
  instances:
    groqApi:
      slidingWindowSize: 5
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 3
resilience4j.retry:
  instances:
    groqApi:
      maxAttempts: 3
      waitDuration: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    console: "%d{ISO8601} [%X{requestId}] %-5level %logger{36} - %msg%n"

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:2592000000}
